<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[WebGPT]</title>
    
    <!-- PWA化のためのManifestとメタタグ (縮小調整されたPWAアプリアイコンを適用) -->
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22WebGPT%22%2C%22short_name%22%3A%22WebGPT%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%23111827%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bbase64%2CPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgMzIgMzIiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzExMTgyNyIgc3Ryb2tlLXdpZHRoPSIxLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI%2BPGcgdHJhbnNmb3JtPSJ0cmFuc2xhdGUoNCwgNCkiPjxwYXRoIGQ9Ik0yMSAxNWEyIDIgMCAwIDEtMiAySDdsLTQgNFY1YTIgMiAwIDAgMSAyLTJoMTRhMiAyIDAgMCAxIDIgMnoiPjwvcGF0aD48L2c%2BPC9zdmc%2B%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">

    <!-- プレビュー環境でのエラー回避用 (実際にローカルや独自サーバーでPWA化する際は、このbaseタグを削除してください) -->
    <base href="https://esm.run/" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#111827',
                        secondary: '#f3f4f6',
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
            background-color: #9ca3af;
            border-radius: 50%;
            display: inline-block;
            height: 5px;
            width: 5px;
            margin: 0 1px;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .message-content { white-space: pre-wrap; word-break: break-word; }
        .message-content code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #db2777; }
        .user-msg .message-content code { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body class="bg-white text-gray-800 h-screen w-full flex overflow-hidden font-sans">

    <!-- サイドバー (スムーズな開閉アニメーション対応) -->
    <aside id="sidebar" class="w-72 bg-gray-50 border-r border-gray-200 flex flex-col transform transition-all duration-300 absolute lg:relative z-20 h-full lg:translate-x-0 -translate-x-full shrink-0">
        <div class="h-16 flex items-center justify-between px-5 border-b border-gray-200 bg-gray-50 shrink-0">
            <h1 class="font-bold text-gray-800 tracking-tight flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500"></span> WebGPT
            </h1>
            <button onclick="createNewChat()" class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-gray-600 transition" title="新規チャット">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-3 space-y-1" id="history-list">
            <!-- 履歴リスト -->
        </div>

        <div class="p-4 border-t border-gray-200 bg-gray-100/50 shrink-0">
            <div class="mb-3">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Model</label>
                <div class="relative">
                    <select id="model-select" class="w-full bg-white border border-gray-200 text-gray-700 text-xs rounded-lg p-2.5 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 block outline-none appearance-none cursor-pointer font-medium shadow-sm">
                        <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen 2.5 0.5B</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center justify-between text-[10px] text-gray-500">
                <div class="flex items-center gap-1.5">
                    <span id="status-text">Idle</span>
                </div>
                <button onclick="clearAllData()" class="hover:text-red-500 transition-colors">Clear Data</button>
            </div>
            
            <div id="progress-wrapper" class="w-full bg-gray-200 rounded-full h-1 mt-2 hidden overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </aside>

    <!-- オーバーレイ -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/20 z-10 hidden lg:hidden backdrop-blur-sm transition-opacity opacity-0" onclick="toggleSidebar()"></div>

    <!-- メイン画面 (フレックスボックス設計を改善してスクロールバグを完全に解消) -->
    <main class="flex-1 flex flex-col h-full relative min-w-0 bg-white">
        <!-- ヘッダー -->
        <header class="h-16 flex items-center px-5 border-b border-gray-100 shrink-0 justify-between bg-white/80 backdrop-blur z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-gray-500 hover:bg-gray-100 p-2 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <span id="chat-title" class="font-semibold text-gray-800 truncate">New Chat</span>
            </div>
            <div class="text-[10px] text-gray-400 border border-gray-200 px-2 py-1 rounded-full hidden sm:block">
                Alt key: Sidebar
            </div>
        </header>

        <!-- チャットエリア (独立したスクロールを確保) -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-smooth">
            <!-- 初期表示 (ウェルカムアイコンを縮小) -->
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-40 select-none py-10">
                <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mb-4 text-gray-300 shadow-sm border border-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <h2 class="text-lg font-bold text-gray-800 mb-1">WebGPT Offline</h2>
                <p class="text-xs text-gray-500">Your private AI assistant.<br>Running locally in your browser.</p>
            </div>
        </div>

        <!-- 入力エリア (absoluteを廃止しフローに配置することで、メッセージが隠れる問題を修正) -->
        <div class="bg-white border-t border-gray-100 pt-3 pb-6 px-4 shrink-0">
            <div class="max-w-3xl mx-auto">
                <div class="bg-gray-50 border border-gray-200 rounded-2xl flex items-end p-2 focus-within:ring-2 focus-within:ring-blue-100 focus-within:border-blue-400 transition-all shadow-sm">
                    <textarea id="user-input" rows="1" class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-3 max-h-40 text-gray-800 placeholder-gray-400 text-sm leading-relaxed" placeholder="メッセージを入力..."></textarea>
                    <button id="send-btn" class="mb-1 mr-1 p-2 bg-gray-900 text-white rounded-xl hover:bg-gray-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed transition-all shadow-sm flex-shrink-0" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- アプリケーションロジック -->
    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const state = {
            engine: null,
            isLoading: false,
            currentModel: document.getElementById('model-select').value,
            chatId: null,
            history: JSON.parse(localStorage.getItem('webgpt_history') || '{}'),
            messages: []
        };

        const els = {
            input: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            chatContainer: document.getElementById('chat-container'),
            welcomeScreen: document.getElementById('welcome-screen'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('mobile-overlay'),
            modelSelect: document.getElementById('model-select'),
            statusText: document.getElementById('status-text'),
            progressBar: document.getElementById('progress-bar'),
            progressWrapper: document.getElementById('progress-wrapper'),
            historyList: document.getElementById('history-list'),
            chatTitle: document.getElementById('chat-title')
        };

        // --- 初期化 ---
        window.addEventListener('load', () => {
            const savedModel = localStorage.getItem('webgpt_last_model');
            if (savedModel && Array.from(els.modelSelect.options).some(o => o.value === savedModel)) {
                els.modelSelect.value = savedModel;
                state.currentModel = savedModel;
            }
            
            renderHistoryList();
            createNewChat();

            // Altキーでサイドバー開閉 (バグ対策: イベントリスナーを最適化)
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Alt') {
                    e.preventDefault();
                }
            });
            window.addEventListener('keyup', (e) => {
                if (e.key === 'Alt') {
                    e.preventDefault();
                    toggleSidebar();
                }
            });

            // 入力欄の制御
            els.input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                els.sendBtn.disabled = this.value.trim() === '';
            });

            els.input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!els.sendBtn.disabled) sendMessage();
                }
            });

            els.sendBtn.addEventListener('click', sendMessage);

            els.modelSelect.addEventListener('change', (e) => {
                state.currentModel = e.target.value;
                localStorage.setItem('webgpt_last_model', state.currentModel);
            });
        });

        // --- エンジン管理 ---
        async function getEngine() {
            if (!navigator.gpu) {
                const msg = "お使いのブラウザはWebGPUをサポートしていないようです。\nChrome/Edgeの最新版をご利用ください。";
                els.statusText.innerText = 'No WebGPU';
                alert(msg);
                throw new Error("WebGPU not supported");
            }

            if (state.engine && state.engine.modelId === state.currentModel) return state.engine;

            state.isLoading = true;
            els.statusText.innerText = 'Downloading Model...';
            els.progressWrapper.classList.remove('hidden');
            els.progressBar.style.width = '0%';

            try {
                const engine = await CreateMLCEngine(
                    state.currentModel,
                    {
                        initProgressCallback: (report) => {
                            const percent = report.progress * 100;
                            els.progressBar.style.width = `${percent}%`;
                            els.statusText.innerText = report.text.length > 30 ? 'Downloading Data...' : report.text;
                        }
                    }
                );
                
                state.engine = engine;
                state.engine.modelId = state.currentModel; 
                
                els.statusText.innerText = 'Ready (Offline Capable)';
                els.progressWrapper.classList.add('hidden');
                state.isLoading = false;
                return engine;

            } catch (error) {
                console.error("Engine Load Error:", error);
                state.isLoading = false;
                els.statusText.innerText = 'Error';
                els.progressWrapper.classList.add('hidden');
                
                let msg = `Model Load Failed.\n${error.message}`;
                if (!navigator.gpu) msg += "\n(WebGPU not supported)";
                
                appendMessage('system', msg);
                return null;
            }
        }

        // --- メッセージ処理 ---
        async function sendMessage() {
            const text = els.input.value.trim();
            if (!text || state.isLoading) return;

            els.input.value = '';
            els.input.style.height = 'auto';
            els.sendBtn.disabled = true;
            els.welcomeScreen.classList.add('hidden');

            appendMessage('user', text);
            state.messages.push({ role: 'user', content: text });
            saveChat();

            const aiMsgId = appendMessage('assistant', '');
            const aiBubble = document.getElementById(aiMsgId);
            const contentDiv = aiBubble.querySelector('.message-content');
            
            const loader = document.createElement('div');
            loader.className = 'flex gap-1 py-1';
            loader.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            contentDiv.appendChild(loader);

            try {
                const engine = await getEngine();
                if (!engine) {
                    contentDiv.innerHTML = '<span class="text-red-500">Failed to initialize engine.</span>';
                    return;
                }

                contentDiv.innerHTML = ''; 
                
                const chunks = await engine.chat.completions.create({
                    messages: state.messages,
                    stream: true,
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    fullResponse += content;
                    contentDiv.innerText = fullResponse;
                    scrollToBottom();
                }

                state.messages.push({ role: 'assistant', content: fullResponse });
                saveChat();

            } catch (err) {
                console.error("Generation Error:", err);
                contentDiv.innerText += "\n[Error generating response]";
            }
        }

        // --- UI構築 ---
        function appendMessage(role, text) {
            const div = document.createElement('div');
            const id = 'msg-' + Date.now();
            div.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.id = id;
            
            const baseClass = "max-w-[85%] lg:max-w-[75%] px-5 py-3.5 rounded-2xl text-sm leading-relaxed shadow-sm message-content";
            const userClass = "bg-gray-900 text-white rounded-br-sm user-msg";
            const aiClass = "bg-white border border-gray-200 text-gray-800 rounded-bl-sm";
            const sysClass = "bg-red-50 text-red-500 border border-red-100 text-xs py-2 px-3 mx-auto rounded-lg";

            if (role === 'system') {
                div.className = "flex justify-center my-2";
                bubble.className = sysClass;
            } else {
                bubble.className = `${baseClass} ${role === 'user' ? userClass : aiClass}`;
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = "message-content";
            if(role !== 'assistant' || text !== '') {
                contentDiv.innerText = text;
            }
            bubble.appendChild(contentDiv);

            div.appendChild(bubble);
            els.chatContainer.appendChild(div);
            scrollToBottom();
            return id;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
            });
        }

        // --- 履歴管理 ---
        window.createNewChat = () => {
            state.chatId = 'chat_' + Date.now();
            state.messages = [];
            els.chatContainer.innerHTML = '';
            els.chatContainer.appendChild(els.welcomeScreen);
            els.welcomeScreen.classList.remove('hidden');
            els.chatTitle.innerText = "New Chat";
            if (window.innerWidth < 1024) toggleSidebar(false);
            renderHistoryList();
        };

        window.loadChat = (id) => {
            const chat = state.history[id];
            if (!chat) return;
            state.chatId = id;
            state.messages = chat.messages || [];
            
            els.chatContainer.innerHTML = '';
            if (state.messages.length === 0) {
                 els.chatContainer.appendChild(els.welcomeScreen);
                 els.welcomeScreen.classList.remove('hidden');
            } else {
                els.welcomeScreen.classList.add('hidden');
                state.messages.forEach(msg => appendMessage(msg.role, msg.content));
            }
            els.chatTitle.innerText = chat.title || "Chat";
            if (window.innerWidth < 1024) toggleSidebar(false);
            renderHistoryList();
        };

        function saveChat() {
            if (state.messages.length === 0) return;
            const firstMsg = state.messages.find(m => m.role === 'user');
            const title = firstMsg ? (firstMsg.content.substring(0, 20) + "...") : "Chat";
            els.chatTitle.innerText = title;
            state.history[state.chatId] = {
                id: state.chatId,
                title: title,
                timestamp: Date.now(),
                messages: state.messages
            };
            localStorage.setItem('webgpt_history', JSON.stringify(state.history));
            renderHistoryList();
        }

        window.deleteChat = (e, id) => {
            e.stopPropagation();
            if (!confirm("Delete this chat?")) return;
            delete state.history[id];
            localStorage.setItem('webgpt_history', JSON.stringify(state.history));
            if (state.chatId === id) createNewChat();
            else renderHistoryList();
        };

        window.clearAllData = () => {
            if(confirm("Reset all history?")) {
                localStorage.removeItem('webgpt_history');
                location.reload();
            }
        };

        function renderHistoryList() {
            els.historyList.innerHTML = '';
            const list = Object.values(state.history).sort((a,b) => b.timestamp - a.timestamp);
            if (list.length === 0) {
                els.historyList.innerHTML = '<div class="text-[10px] text-center text-gray-400 mt-4 uppercase tracking-wider">No History</div>';
                return;
            }
            list.forEach(chat => {
                const isActive = chat.id === state.chatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2.5 rounded-lg cursor-pointer text-sm transition-all mb-1 ${
                    isActive ? 'bg-white shadow-sm ring-1 ring-black/5 text-gray-900 font-medium' : 'text-gray-600 hover:bg-white/60'
                }`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <span class="truncate flex-1">${chat.title}</span>
                    <button onclick="deleteChat(event, '${chat.id}')" class="opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-red-500 transition-opacity">×</button>
                `;
                els.historyList.appendChild(div);
            });
        }

        // --- サイドバー開閉ロジックの最適化 (デスクトップ時のスライド隠しに対応) ---
        window.toggleSidebar = (forceState) => {
            const isClosed = els.sidebar.classList.contains('-translate-x-full') || els.sidebar.classList.contains('lg:-ml-72');
            const shouldOpen = forceState !== undefined ? forceState : isClosed;

            if (shouldOpen) {
                // サイドバーを開く
                els.sidebar.classList.remove('-translate-x-full', 'lg:-ml-72');
                els.overlay.classList.remove('hidden');
                setTimeout(() => els.overlay.classList.remove('opacity-0'), 10);
            } else {
                // サイドバーを閉じる (デスクトップはネガティブマージン、モバイルはマイナストランスレート)
                els.sidebar.classList.add('-translate-x-full', 'lg:-ml-72');
                els.overlay.classList.add('opacity-0');
                setTimeout(() => els.overlay.classList.add('hidden'), 300);
            }
        };
    </script>
</body>
</html>
